  slot: 48
  name: '&7▪ &#EEBDA6Выход'
  lore:
    - ''
    - ' &#ddddddНажмите, чтобы закрыть меню.'
    - ''

# Кнопка "Продать всё" — продаёт все скупаемые руды из инвентаря (нативно, без EssentialsX).
sell-all:
  material: CHEST_MINECART
  slot: 40
  name: '&7▪ &#B9E6AEПродать всё'
  lore:
    - ''
    - ' &#ddddddПродаёт все скупаемые руды'
    - ' &#ddddddиз твоего инвентаря.'
    - ''
    - ' &#eaff43> &#EFE0A1Нажми, чтобы продать всё'
    - ''

# Шаблон лора для каждой руды. Плейсхолдеры: %price1% %price64% %priceAll% %have%
item-lore:
  - ''
  - ' &#ddddddЦена за &#EFE0A1x1: &f%price1%&#EBC162 © &#b9b9b9(ЛКМ)'
  - ' &#ddddddЦена за &#EFE0A1x64: &f%price64%&#EBC162 © &#b9b9b9(ПКМ)'
  - ''
  - ' &#ddddddЦена за &#EFE0A1всё: &f%priceAll%&#EBC162 © &#b9b9b9(ШИФТ+ЛКМ)'
  - ''
  - ' &#B9E6AE- &#ddddddМожно продавать без лимита.'
  - ' &#ddddddВ инвентаре: &#EFE0A1%have% &#ddddddшт.'
  - ''

