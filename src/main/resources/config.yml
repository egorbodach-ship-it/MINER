# ============================================================
#  MinerSeller — конфигурация меню скупщика руды
#  Цвета: поддерживаются & коды и HEX (#RRGGBB или &#RRGGBB)
# ============================================================

menu:
  title: '              &8| ᴍɪɴᴇʀ |'
  size: 54

# Выдача валюты:
#  use-vault: true  -> начислять деньги напрямую через Vault (рекомендуется).
#                      Нужен любой эко-плагин, зарегистрированный в Vault (EssentialsX, CMI и т.п.).
#  use-vault: false -> выполнять команду eco-command от консоли.
use-vault: true
# Резервная команда, если Vault-экономика не найдена. %player% и %amount% подставляются автоматически.
eco-command: 'eco give %player% %amount%'
# Звук при успешной продаже (имя из org.bukkit.Sound). Пусто = без звука.
sell-sound: ENTITY_EXPERIENCE_ORB_PICKUP

messages:
  prefix: '&8[&#A6E0EEMiner&8] &r'
  no-items: '&cУ тебя нет &f%material% &cв инвентаре.'
  sold: '&aПродано &f%amount%&7x &f%material% &aза &e%total% ©&a.'
  sold-all: '&aПродано всё на сумму &e%total% ©&a.'
  nothing-to-sell: '&cНечего продавать.'

# Стеклянные рамки. Можно задать несколько групп с разными материалами.
fillers:
  gray:
    material: GRAY_STAINED_GLASS_PANE
    name: '&7'
    slots: [9, 17, 18, 26, 27, 29, 30, 31, 32, 33, 35]
  black:
    material: BLACK_STAINED_GLASS_PANE
    name: '&7'
    slots: [0, 1, 2, 3, 4, 5, 6, 7, 8, 36, 37, 38, 39, 41, 42, 43, 44, 45, 46, 47, 49, 51, 52, 53]

# Декоративные предметы без действия (например, голова-информация).
