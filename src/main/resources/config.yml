    material: PLAYER_HEAD
    slot: 50
    skull-texture: 'eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYTFmNTQ0M2M4ZTMwYWQ3YTdhZjIzNjdmODgyMWQ4Mzk4NWZmYjU3OTA0M2NkZmQyMTc3NDFmYmM2ZTljMmVjYyJ9fX0='
    name: '&7▪ &#EFE0A1Скупщик руды'
    lore:
      - ''
      - ' &#ddddddТут можно продать руду.'
      - ''
      - ' &#eaff43> &#EFE0A1ЛКМ &7| &#B0B0B0продать x1'
      - ' &#eaff43> &#EFE0A1ПКМ &7| &#B0B0B0продать x64'
